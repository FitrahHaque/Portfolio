about:
  heading: About Me
  paragraphs:
    - I am a software engineer and research student focused on machine learning and artificial intelligence. I care about building correct, maintainable systems and applying ML to problems that have real-world impact.
    - My current research investigates how learned environmental embeddings can improve crop performance prediction. I enjoy bridging rigorous research with practical software engineering by turning models and ideas into reliable, well-tested tools.
    - I value clear writing, reproducible experiments, and clean code. I am comfortable across the stack, from data pipelines and model training to the interfaces that make results usable.
  highlights:
    - label: Focus
      value: ML / AI
    - label: Research
      value: Environmental embeddings
    - label: Engineering
      value: Full-stack systems
    - label: Approach
      value: Reproducible work

research:
  - title: Optimizing Future Environmental Embedding Representations for Crop Performance
    venue: Ongoing research
    year: "2025"
    authors: Asif Haque
    summary: This work explores how to learn and optimize representations of future environmental conditions, such as climate and soil signals, so that machine learning models can more accurately predict crop performance. The goal is to design embeddings that generalize across regions and seasons, improving forecasting under shifting conditions and supporting data-driven agricultural decisions.
    tags:
      - Machine Learning
      - AI
      - Environmental Embeddings
      - Crop Prediction
    links:
      - label: Paper
        href: https://github.com/ihtemad
      - label: Code
        href: https://github.com/ihtemad
  - title: Research updates and publications
    venue: In progress
    year: Upcoming
    authors: Asif Haque
    summary: A short space for thesis chapters, preprints, datasets, code, and research notes as they become available.
    tags:
      - Publications
      - Thesis
      - Preprints
    links:
      - label: Code
        href: https://github.com/ihtemad

