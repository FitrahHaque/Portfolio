    institution: Western University
    location: ""
    period: 2025 - Aug 2026
    tocLabel: Masters
    summary: I am currently pursuing my MSc in Computer Science at Western University, where I work with Dr. Mike Domaratzki on machine learning methods for representing future environmental conditions in crop performance prediction.
    courses:
      - name: Distributed Systems
        description: Studied distributed-system design through Martin Kleppmann's and Andrew Tanenbaum's books. For the course project, I built a distributed lock service from scratch using the Raft consensus algorithm.
      - name: Image Compression
        description: Explored different compression techniques out of a strong interest in how expert software engineers optimize compression engines for specific data-transfer requirements.
      - name: Reinforcement Learning
        description: Studied reinforcement-learning methods including Q-learning and Proximal Policy Optimization (PPO).
      - name: Machine Learning and Cybersecurity
        description: Studied different classes of cyberattacks and how machine-learning methods can support cybersecurity, anticipating the growing importance of this area.
