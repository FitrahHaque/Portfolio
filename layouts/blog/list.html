{{ define "main" }}
<div class="page-layout">
  <aside class="page-toc" data-page-toc hidden>
    <p class="page-toc-title">On this page</p>
    <nav class="page-toc-nav" data-toc aria-label="{{ .Title }} contents"></nav>
  </aside>
  <article class="page-view page-view-blog" data-toc-content>
    <a class="crumb" href="{{ site.Home.RelPermalink }}">Home</a>
    {{ partial "section-heading.html" (dict "eyebrow" "Writing" "title" .Title) }}

    <div class="entry-list">
      {{ range .RegularPages.ByDate.Reverse }}
        {{ partial "entry-card.html" (dict "page" . "section" "blog" "showArrow" true) }}
      {{ end }}
    </div>
  </article>
</div>
{{ end }}
