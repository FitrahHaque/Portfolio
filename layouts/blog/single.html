{{ define "main" }}
<div class="page-layout">
  <aside class="page-toc" data-page-toc hidden>
    <p class="page-toc-title">On this page</p>
    <nav class="page-toc-nav" data-toc aria-label="{{ .Title }} contents"></nav>
  </aside>
  <article class="page-view blog-post" data-toc-content>
    <a class="crumb" href="{{ "blog/" | relURL }}">Blog</a>
    <header class="post-header">
      <p class="eyebrow">{{ .Date.Format "2006.01.02" }}</p>
      <h1>{{ .Title }}</h1>
      {{ with .Params.summary }}
        <p class="lead">{{ . }}</p>
      {{ end }}
      {{ with .Params.tags }}
        {{ partial "tags.html" . }}
      {{ end }}
    </header>
    <div class="post-content">
      {{ .Content }}
    </div>
  </article>
</div>
{{ end }}
