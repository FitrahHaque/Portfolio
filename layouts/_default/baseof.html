<!doctype html>
<html lang="{{ .Site.Language.Locale | default "en" }}">
  {{ partial "head.html" . }}
  <body>
    <a class="skip-link" href="#main">Skip to content</a>
    <div class="site-shell">
      {{ partial "sidebar.html" . }}
      <div class="content-shell">
        <main id="main">
          {{ block "main" . }}{{ end }}
        </main>
        {{ partial "footer.html" . }}
      </div>
    </div>
  </body>
</html>
